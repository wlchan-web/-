<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>畢氏定理探究</title>
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --highlight: #f1c40f; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; color: var(--primary); display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
        h1 { margin-bottom: 30px; }
        table { border-collapse: collapse; width: 100%; max-width: 800px; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-radius: 8px; overflow: hidden; margin-bottom: 30px; }
        th, td { padding: 15px; text-align: center; border-bottom: 1px solid #ddd; font-size: 18px; }
        th { background-color: var(--primary); color: white; font-weight: 600; }
        input[type="number"] { width: 70px; padding: 8px; font-size: 18px; text-align: center; border: 2px solid #ccc; border-radius: 4px; transition: border-color 0.3s; }
        input[type="number"]:focus { outline: none; border-color: #3498db; }
        .correct { background-color: #e8f8f5; border-color: var(--success) !important; color: var(--success); font-weight: bold; }
        .row-done { background-color: #fbfcfa; }
        
        /* 隱藏區域：發現規律與結論 */
        #discovery-section { display: none; text-align: center; max-width: 600px; animation: fadeIn 1s ease-in; }
        .guiding-question { font-size: 24px; color: #d35400; font-weight: bold; margin-bottom: 20px; padding: 15px; background: #fdebd0; border-radius: 8px; border-left: 6px solid #e67e22; }
        #reveal-btn { background-color: var(--primary); color: white; border: none; padding: 15px 30px; font-size: 20px; border-radius: 8px; cursor: pointer; transition: transform 0.2s, background 0.2s; }
        #reveal-btn:hover { background-color: #34495e; transform: scale(1.05); }
        
        /* 終極定理展示 */
        #theorem-display { display: none; margin-top: 30px; font-size: 48px; font-weight: bold; color: var(--success); padding: 30px; border: 4px dashed var(--success); border-radius: 12px; background: white; animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .math-var { font-style: italic; font-family: 'Times New Roman', Times, serif; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.5); } 100% { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <h1>🔍 幾何規律大發現</h1>
    <p>請根據工作紙上的 5 組直角三角形數據，填寫下方表格，並計算它們的平方值。</p>

    <table id="data-table">
        <thead>
            <tr>
                <th>組別</th>
                <th>邊長 a</th>
                <th>邊長 b</th>
                <th>斜邊 c</th>
                <th>a&sup2;</th>
                <th>b&sup2;</th>
                <th>c&sup2;</th>
                <th>狀態</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>

    <div id="discovery-section">
        <div class="guiding-question">
            💡 任務完成！而家請你仔細睇翻上面嗰 5 組 a&sup2;、b&sup2; 同 c&sup2; 嘅數據... <br>
            你有冇發現佢哋之間隱藏住咩特別嘅關係？
        </div>
        <button id="reveal-btn">我發現咗規律！點擊揭曉</button>
        
        <div id="theorem-display">
            <span class="math-var">a&sup2;</span> + <span class="math-var">b&sup2;</span> = <span class="math-var">c&sup2;</span>
        </div>
    </div>

<script>
    const totalRows = 5;
    const tbody = document.querySelector('#data-table tbody');
    let completedRows = 0;

    // 動態生成 5 行輸入框
    for (let i = 1; i <= totalRows; i++) {
        const tr = document.createElement('tr');
        tr.id = `row-${i}`;
        tr.innerHTML = `
            <td>#${i}</td>
            <td><input type="number" id="a-${i}" placeholder="a"></td>
            <td><input type="number" id="b-${i}" placeholder="b"></td>
            <td><input type="number" id="c-${i}" placeholder="c"></td>
            <td><input type="number" id="a2-${i}" placeholder="a&sup2;" disabled></td>
            <td><input type="number" id="b2-${i}" placeholder="b&sup2;" disabled></td>
            <td><input type="number" id="c2-${i}" placeholder="c&sup2;" disabled></td>
            <td id="status-${i}">⏳</td>
        `;
        tbody.appendChild(tr);
    }

    // 綁定 Event Listeners
    for (let i = 1; i <= totalRows; i++) {
        const a = document.getElementById(`a-${i}`);
        const b = document.getElementById(`b-${i}`);
        const c = document.getElementById(`c-${i}`);
        const a2 = document.getElementById(`a2-${i}`);
        const b2 = document.getElementById(`b2-${i}`);
        const c2 = document.getElementById(`c2-${i}`);

        // 當 a, b, c 都填好咗，解鎖平方輸入框
        const checkBaseInputs = () => {
            if (a.value && b.value && c.value) {
                a2.disabled = false; b2.disabled = false; c2.disabled = false;
            }
        };

        [a, b, c].forEach(input => input.addEventListener('input', checkBaseInputs));

        // 即時驗證平方計算
        const verifySquares = () => {
            let aCorrect = a2.value !== "" && Number(a2.value) === Math.pow(Number(a.value), 2);
            let bCorrect = b2.value !== "" && Number(b2.value) === Math.pow(Number(b.value), 2);
            let cCorrect = c2.value !== "" && Number(c2.value) === Math.pow(Number(c.value), 2);

            a2.classList.toggle('correct', aCorrect);
            b2.classList.toggle('correct', bCorrect);
            c2.classList.toggle('correct', cCorrect);

            // 檢查成行係咪搞掂，兼且係咪符合畢氏定理 (防止學生入錯非直角三角形數據)
            const status = document.getElementById(`status-${i}`);
            const isPythagorean = (Number(a2.value) + Number(b2.value) === Number(c2.value));

            if (aCorrect && bCorrect && cCorrect) {
                if (isPythagorean) {
                    if (status.innerText !== "✅") {
                        status.innerText = "✅";
                        document.getElementById(`row-${i}`).classList.add('row-done');
                        completedRows++;
                        checkOverallProgress();
                    }
                } else {
                    status.innerText = "⚠️ 唔似係直角三角形";
                }
            } else {
                if (status.innerText === "✅") {
                    status.innerText = "⏳";
                    document.getElementById(`row-${i}`).classList.remove('row-done');
                    completedRows--;
                }
            }
        };

        [a2, b2, c2].forEach(input => input.addEventListener('input', verifySquares));
    }

    // 檢查整體進度
    function checkOverallProgress() {
        if (completedRows === totalRows) {
            document.getElementById('discovery-section').style.display = 'block';
            // 捲動到最底，確保學生睇到引導問題
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
    }

    // 展示結論按鈕
    document.getElementById('reveal-btn').addEventListener('click', function() {
        this.style.display = 'none';
        document.getElementById('theorem-display').style.display = 'block';
    });
</script>

</body>
</html>
