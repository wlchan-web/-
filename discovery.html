<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>畢氏定理探究</title>
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --highlight: #f1c40f; }
        
        /* 目標 1：加入背景圖片 */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            color: var(--primary); 
            display: flex; flex-direction: column; align-items: center; 
            padding: 40px 20px; margin: 0; min-height: 100vh;
            
            /* 喺度設定你嘅背景圖片，將 'bg.png' 改做你上載嘅檔名 */
            background-color: #f8f9fa;
            background-image: url('bg.png'); 
            background-repeat: repeat;
            background-blend-mode: overlay; /* 令背景稍為淡化，唔會遮住啲字 */
        }

        h1 { margin-bottom: 30px; background: rgba(255,255,255,0.8); padding: 10px 20px; border-radius: 8px; }
        table { border-collapse: collapse; width: 100%; max-width: 800px; background: rgba(255,255,255,0.95); box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-radius: 8px; overflow: hidden; margin-bottom: 30px; }
        th, td { padding: 15px; text-align: center; border-bottom: 1px solid #ddd; font-size: 18px; }
        th { background-color: var(--primary); color: white; font-weight: 600; }
        input[type="number"] { width: 70px; padding: 8px; font-size: 18px; text-align: center; border: 2px solid #ccc; border-radius: 4px; transition: border-color 0.3s; }
        input[type="number"]:focus { outline: none; border-color: #3498db; }
        .correct { background-color: #e8f8f5; border-color: var(--success) !important; color: var(--success); font-weight: bold; }
        .row-done { background-color: #fbfcfa; }
        
        /* 隱藏區域 */
        #discovery-section { display: none; text-align: center; max-width: 600px; animation: fadeIn 1s ease-in; background: rgba(255,255,255,0.9); padding: 20px; border-radius: 12px;}
        .guiding-question { font-size: 24px; color: #d35400; font-weight: bold; margin-bottom: 20px; padding: 15px; background: #fdebd0; border-radius: 8px; border-left: 6px solid #e67e22; }
        #reveal-btn { background-color: var(--primary); color: white; border: none; padding: 15px 30px; font-size: 20px; border-radius: 8px; cursor: pointer; transition: transform 0.2s; }
        #reveal-btn:hover { background-color: #34495e; transform: scale(1.05); }
        #theorem-display { display: none; margin-top: 30px; font-size: 48px; font-weight: bold; color: var(--success); padding: 30px; border: 4px dashed var(--success); border-radius: 12px; background: white; animation: popIn 0.6s; }
        
        /* 目標 3：登入介面 Overlay */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(44, 62, 80, 0.95); z-index: 1000;
            display: flex; justify-content: center; align-items: center;
        }
        .login-box { background: white; padding: 40px; border-radius: 12px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .login-box h2 { margin-top: 0; color: var(--primary); }
        .login-box input { padding: 12px; font-size: 20px; width: 200px; text-align: center; margin: 20px 0; border: 2px solid #bdc3c7; border-radius: 6px; text-transform: uppercase; }
        .login-box button { background-color: #2980b9; color: white; border: none; padding: 12px 30px; font-size: 18px; border-radius: 6px; cursor: pointer; }
        
        #main-content { display: none; width: 100%; display: flex; flex-direction: column; align-items: center; } /* 預設隱藏主內容 */

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.5); } 100% { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2>👋 歡迎進入數學探究</h2>
            <p>請輸入你的班別及學號 (例: 2C 05)</p>
            <input type="text" id="student-name" placeholder="2C 05" autocomplete="off">
            <br>
            <button id="start-btn">開始任務 🚀</button>
        </div>
    </div>

    <div id="main-content" style="display: none;">
        <h1>🔍 幾何規律大發現 (<span id="display-name"></span>)</h1>
        
        <table id="data-table">
            <thead>
                <tr>
                    <th>組別</th><th>邊長 a</th><th>邊長 b</th><th>斜邊 c</th>
                    <th>a&sup2;</th><th>b&sup2;</th><th>c&sup2;</th><th>狀態</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>

        <div id="discovery-section">
            <div class="guiding-question">
                💡 任務完成！仔細睇翻上面 5 組 a&sup2;、b&sup2; 同 c&sup2; 嘅數據... <br>
                你有冇發現佢哋之間隱藏住咩特別嘅關係？
            </div>
            <button id="reveal-btn">我發現咗規律！點擊揭曉</button>
            <div id="theorem-display">a&sup2; + b&sup2; = c&sup2;</div>
        </div>
    </div>

<script type="module">
    // 1. 引入 Firebase
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, set, update } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    // 2. 教師請在此填入 Firebase Config 
    // (去 Firebase Console -> Project Settings -> 搵到 firebaseConfig Object)
    const firebaseConfig = {
  apiKey: "AIzaSyAjcLlsjAnUceq6BhjPCkjckIsbgR4Z0qc",
  authDomain: "understanding-pyth.firebaseapp.com",
  databaseURL: "https://understanding-pyth-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "understanding-pyth",
  storageBucket: "understanding-pyth.firebasestorage.app",
  messagingSenderId: "348135263643",
  appId: "1:348135263643:web:7d3b2eae0ba43ebca4653e",
  measurementId: "G-GS7QPFD0D5"
};

    // 初始化 Firebase
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // 全局變數
    let studentID = "";
    const totalRows = 5;
    let completedRows = 0;

    // --- 登入邏輯 ---
    document.getElementById('start-btn').addEventListener('click', () => {
        const inputVal = document.getElementById('student-name').value.trim().toUpperCase();
        if (inputVal === "") {
            alert("請先輸入學號！"); return;
        }
        
        studentID = inputVal;
        document.getElementById('display-name').innerText = studentID;
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('main-content').style.display = 'flex';

        // 登入時，喺 Firebase 建立呢位學生嘅資料
        set(ref(db, 'pythagoras_lesson/' + studentID), {
            progress: 0,
            status: "working", // working, finished, discovered
            lastUpdated: new Date().toLocaleTimeString()
        });
    });

    // --- 表格生成與驗證邏輯 ---
    const tbody = document.querySelector('#data-table tbody');
    for (let i = 1; i <= totalRows; i++) {
        const tr = document.createElement('tr');
        tr.id = `row-${i}`;
        tr.innerHTML = `
            <td>#${i}</td>
            <td><input type="number" id="a-${i}"></td>
            <td><input type="number" id="b-${i}"></td>
            <td><input type="number" id="c-${i}"></td>
            <td><input type="number" id="a2-${i}" disabled></td>
            <td><input type="number" id="b2-${i}" disabled></td>
            <td><input type="number" id="c2-${i}" disabled></td>
            <td id="status-${i}">⏳</td>
        `;
        tbody.appendChild(tr);
    }

    // 綁定 Event Listeners
    for (let i = 1; i <= totalRows; i++) {
        const a = document.getElementById(`a-${i}`), b = document.getElementById(`b-${i}`), c = document.getElementById(`c-${i}`);
        const a2 = document.getElementById(`a2-${i}`), b2 = document.getElementById(`b2-${i}`), c2 = document.getElementById(`c2-${i}`);

        const checkBaseInputs = () => { if (a.value && b.value && c.value) { a2.disabled = false; b2.disabled = false; c2.disabled = false; } };
        [a, b, c].forEach(input => input.addEventListener('input', checkBaseInputs));

        const verifySquares = () => {
            let aCorrect = a2.value !== "" && Number(a2.value) === Math.pow(Number(a.value), 2);
            let bCorrect = b2.value !== "" && Number(b2.value) === Math.pow(Number(b.value), 2);
            let cCorrect = c2.value !== "" && Number(c2.value) === Math.pow(Number(c.value), 2);

            a2.classList.toggle('correct', aCorrect); b2.classList.toggle('correct', bCorrect); c2.classList.toggle('correct', cCorrect);

            const status = document.getElementById(`status-${i}`);
            const isPythagorean = (Number(a2.value) + Number(b2.value) === Number(c2.value));

            if (aCorrect && bCorrect && cCorrect) {
                if (isPythagorean) {
                    if (status.innerText !== "✅") {
                        status.innerText = "✅";
                        document.getElementById(`row-${i}`).classList.add('row-done');
                        completedRows++;
                        updateFirebaseProgress(); // 更新 Firebase!
                        checkOverallProgress();
                    }
                } else { status.innerText = "⚠️ 唔似直角三角形"; }
            } else {
                if (status.innerText === "✅") {
                    status.innerText = "⏳";
                    document.getElementById(`row-${i}`).classList.remove('row-done');
                    completedRows--;
                    updateFirebaseProgress(); // 更新 Firebase!
                }
            }
        };
        [a2, b2, c2].forEach(input => input.addEventListener('input', verifySquares));
    }

    // --- Firebase 更新函數 ---
    function updateFirebaseProgress() {
        if(!studentID) return;
        update(ref(db, 'pythagoras_lesson/' + studentID), {
            progress: completedRows,
            status: completedRows === 5 ? "finished" : "working",
            lastUpdated: new Date().toLocaleTimeString()
        });
    }

    function checkOverallProgress() {
        if (completedRows === totalRows) {
            document.getElementById('discovery-section').style.display = 'block';
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
    }

    // 點擊揭曉定理
    document.getElementById('reveal-btn').addEventListener('click', function() {
        this.style.display = 'none';
        document.getElementById('theorem-display').style.display = 'block';
        
        // 記錄學生已經成功發現定理
        update(ref(db, 'pythagoras_lesson/' + studentID), {
            status: "discovered!",
            lastUpdated: new Date().toLocaleTimeString()
        });
    });
</script>

</body>
</html>
